<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 couch: backrest jutting up along the top, seat + cushions below, arms -->
  <ellipse cx="50" cy="92" rx="44" ry="6" fill="#000" fill-opacity="0.2"/>
  <!-- backrest (juts up) -->
  <rect x="8" y="12" width="84" height="30" rx="8" fill="#7a5656" stroke="#412c2c" stroke-width="3"/>
  <rect x="8" y="12" width="84" height="8" rx="4" fill="#5a3e3e"/>
  <!-- seat base -->
  <rect x="8" y="38" width="84" height="48" rx="8" fill="#6a4a4a" stroke="#412c2c" stroke-width="3"/>
  <rect x="17" y="46" width="32" height="34" rx="5" fill="#7d5a5a"/>
  <rect x="51" y="46" width="32" height="34" rx="5" fill="#7d5a5a"/>
  <!-- armrests -->
  <rect x="5" y="36" width="13" height="50" rx="5" fill="#5a3e3e" stroke="#412c2c" stroke-width="2"/>
  <rect x="82" y="36" width="13" height="50" rx="5" fill="#5a3e3e" stroke="#412c2c" stroke-width="2"/>
</svg>
