<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- chair from behind: backrest panel on top, a thin seat lip, then the legs -->
  <ellipse cx="50" cy="90" rx="28" ry="6" fill="#000" fill-opacity="0.2"/>
  <!-- backrest -->
  <rect x="26" y="12" width="48" height="40" rx="5" fill="#6e5030" stroke="#4a3620" stroke-width="3"/>
  <rect x="26" y="12" width="48" height="9" rx="4" fill="#5e4326"/>
  <!-- seat back edge (thin lip, not a slab) -->
  <rect x="24" y="50" width="52" height="11" rx="3" fill="#6a4e2e" stroke="#4a3620" stroke-width="3"/>
  <!-- four legs splaying down behind the seat -->
  <g fill="#5e4326" stroke="#4a3620" stroke-width="1.5">
    <rect x="27" y="61" width="7" height="25"/>
    <rect x="66" y="61" width="7" height="25"/>
    <rect x="40" y="63" width="6" height="21"/>
    <rect x="54" y="63" width="6" height="21"/>
  </g>
</svg>
