<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 120">
  <!-- thin SIDE of a filing cabinet -->
  <rect x="6" y="3" width="18" height="114" fill="#7d7d83" stroke="#55555a" stroke-width="2.5"/>
  <rect x="6" y="3" width="5" height="114" fill="#9a9aa0"/>
  <!-- drawer seams -->
  <g stroke="#55555a" stroke-width="1.6">
    <line x1="6" y1="33" x2="24" y2="33"/>
    <line x1="6" y1="63" x2="24" y2="63"/>
    <line x1="6" y1="93" x2="24" y2="93"/>
  </g>
  <!-- handle nubs on the front edge -->
  <g fill="#3f3f44"><rect x="7" y="16" width="3" height="4"/><rect x="7" y="46" width="3" height="4"/><rect x="7" y="76" width="3" height="4"/><rect x="7" y="106" width="3" height="4"/></g>
</svg>
