<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 170">
  <!-- FRONT of a tall bookshelf: four shelves of book spines -->
  <rect x="3" y="3" width="64" height="164" fill="#5a3f22" stroke="#34230f" stroke-width="4"/>
  <!-- recessed back behind each shelf -->
  <g fill="#2e2012">
    <rect x="9" y="12" width="52" height="30"/>
    <rect x="9" y="52" width="52" height="30"/>
    <rect x="9" y="92" width="52" height="30"/>
    <rect x="9" y="132" width="52" height="30"/>
  </g>
  <!-- book spines (vary color/width/height per shelf) -->
  <g>
    <rect x="11" y="16" width="8" height="26" fill="#8a3a3a"/><rect x="20" y="14" width="6" height="28" fill="#3a6a4a"/>
    <rect x="27" y="18" width="9" height="24" fill="#c2a24a"/><rect x="37" y="15" width="6" height="27" fill="#3a567a"/>
    <rect x="44" y="17" width="8" height="25" fill="#7a4a8a"/><rect x="53" y="14" width="7" height="28" fill="#9a6a3a"/>

    <rect x="11" y="56" width="7" height="26" fill="#3a567a"/><rect x="19" y="54" width="9" height="28" fill="#9a6a3a"/>
    <rect x="29" y="58" width="6" height="24" fill="#8a3a3a"/><rect x="36" y="55" width="8" height="27" fill="#3a6a4a"/>
    <rect x="45" y="57" width="7" height="25" fill="#c2a24a"/><rect x="53" y="54" width="7" height="28" fill="#7a4a8a"/>

    <rect x="11" y="96" width="9" height="26" fill="#7a4a8a"/><rect x="21" y="94" width="6" height="28" fill="#c2a24a"/>
    <rect x="28" y="98" width="8" height="24" fill="#3a567a"/><rect x="37" y="95" width="7" height="27" fill="#8a3a3a"/>
    <rect x="45" y="97" width="8" height="25" fill="#3a6a4a"/><rect x="54" y="94" width="6" height="28" fill="#9a6a3a"/>

    <rect x="11" y="136" width="6" height="26" fill="#3a6a4a"/><rect x="18" y="134" width="8" height="28" fill="#8a3a3a"/>
    <rect x="27" y="138" width="7" height="24" fill="#9a6a3a"/><rect x="35" y="135" width="9" height="27" fill="#3a567a"/>
    <rect x="45" y="137" width="6" height="25" fill="#c2a24a"/><rect x="52" y="134" width="8" height="28" fill="#7a4a8a"/>
  </g>
  <!-- shelf boards -->
  <g fill="#6e4d2c">
    <rect x="3" y="42" width="64" height="7"/>
    <rect x="3" y="82" width="64" height="7"/>
    <rect x="3" y="122" width="64" height="7"/>
  </g>
</svg>
