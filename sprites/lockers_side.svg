<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 170">
  <!-- thin SIDE panel of the locker bank (vertical-axis rotation: same height) -->
  <rect x="6" y="4" width="18" height="162" fill="#3f4d5a" stroke="#2a3540" stroke-width="3"/>
  <!-- front edge highlight (the door side that faces you) -->
  <rect x="6" y="4" width="5" height="162" fill="#566879"/>
  <!-- shallow seam lines marking the three stacked lockers -->
  <line x1="6" y1="58" x2="24" y2="58" stroke="#2a3540" stroke-width="2"/>
  <line x1="6" y1="112" x2="24" y2="112" stroke="#2a3540" stroke-width="2"/>
  <!-- riveted back edge -->
  <g fill="#2a3540"><circle cx="21" cy="20" r="1.4"/><circle cx="21" cy="85" r="1.4"/><circle cx="21" cy="150" r="1.4"/></g>
</svg>
